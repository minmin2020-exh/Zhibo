<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>东风吹破少年梦，从此再无赤子心！</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#000 url("https://icdn.binmt.cc/2604/69db59cbd3beb.jpeg") center/cover fixed;
    color:#fff;
    font-family:system-ui,roboto;
    min-height:100vh;
    padding:20px;
    padding-bottom:40px;
    overflow-x:hidden;
}

#fireworks{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    pointer-events:none;
    z-index:1;
}

.container{
    max-width:500px;
    margin:0 auto;
    position:relative;
    z-index:2
}
.datetime{
    text-align:center;
    margin:40px 0 24px;
    text-shadow:0 2px 10px rgba(0,0,0,.5);
    cursor:pointer;
    user-select:none;
}
.time{
    font-size:3.2rem;
    font-weight:700
}
.date{
    font-size:1rem;
    opacity:.9
}
.search-wrap{
    position:relative;
    margin-bottom:12px
}
.search-bar{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(6px);
    border-radius:30px;
    height:56px
}
.search-input{
    width:100%;
    height:100%;
    background:transparent;
    border:none;
    outline:none;
    color:#fff;
    font-size:16px;
    padding:0 20px;
    border-radius:30px
}
.suggest{
    position:absolute;
    top:100%;
    left:0;
    right:0;
    margin-top:4px;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(12px);
    border-radius:16px;
    padding:8px;
    display:none;
    z-index:999;
    max-height:240px;
    overflow-y:auto
}
.suggest.show{display:block}
.suggest-item{
    padding:10px 14px;
    border-radius:10px;
    cursor:pointer;
    font-size:15px
}
.suggest-item:hover{background:rgba(255,255,255,.1)}

.nav-box{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    margin-top:20px;
    transition:.3s ease
}
.nav-box.hide{
    opacity:0;
    transform:translateY(10px);
    pointer-events:none
}

.item.hidden {
    display: none;
}

.item{
    display:flex;flex-direction:column;align-items:center;
    gap:6px;text-decoration:none;color:#fff;font-size:12px;
    user-select:none;touch-action:none;
}
.icon{
    width:50px;height:50px;border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-size:20px;font-weight:bold
}

.add-btn {
    cursor: pointer;
}
.add-btn span{display:none}

.mask{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);
    z-index:9999;display:none;align-items:center;justify-content:center
}
.mask.show{display:flex}
.modal{
    background:#111;padding:24px;border-radius:16px;width:90%;max-width:320px
}
.modal input{
    width:100%;padding:12px 14px;margin:8px 0;border-radius:10px;border:none;background:#222;color:#fff
}
.modal .btns{display:flex;gap:10px;margin-top:12px}
.modal button{flex:1;padding:10px;border:none;border-radius:10px;cursor:pointer}
.modal .ok{background:#07c160;color:#fff}
.modal .cancel{background:#333;color:#fff}

.menu{
    position:absolute;background:#1a1a1a;border-radius:12px;padding:8px 0;
    z-index:9999;min-width:140px;display:none
}
.menu.show{display:block}
.menu div{padding:10px 16px;cursor:pointer}
.menu div:hover{background:#333}

.item:nth-child(4n+1) .icon{background:#ff6b6b}
.item:nth-child(4n+2) .icon{background:#4dabf7}
.item:nth-child(4n+3) .icon{background:#51cf66}
.item:nth-child(4n+4) .icon{background:#fab005}

@keyframes marquee {
    0% { transform: translateX(100%); }
    100% { transform: translateX(-100%); }
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<div style="position:fixed;bottom:0;left:0;width:100%;background:rgba(0,0,0,0.5);color:#fff;padding:6px 0;font-size:14px;overflow:hidden;white-space:nowrap;z-index:999;">
  <div style="display:inline-block;animation:marquee 14s linear infinite;">
    欢迎来到我的主页，代缴话费，电费，燃气等费用，欢迎咨询
  </div>
</div>

<div class="mask" id="addMask">
    <div class="modal">
        <input id="addName" placeholder="名称">
        <input id="addUrl" placeholder="网址">
        <div class="btns">
            <button class="cancel" onclick="closeAdd()">取消</button>
            <button class="ok" onclick="saveAdd()">添加</button>
        </div>
    </div>
</div>

<div class="mask" id="editMask">
    <div class="modal">
        <input id="editName" placeholder="名称">
        <input id="editUrl" placeholder="网址">
        <div class="btns">
            <button class="cancel" onclick="closeEdit()">取消</button>
            <button class="ok" onclick="saveEdit()">保存</button>
        </div>
    </div>
</div>

<div class="menu" id="longMenu">
    <div onclick="openEdit()">编辑</div>
    <div onclick="doDel()" style="color:#ff4444">删除</div>
</div>

<div class="container">
    <div class="datetime" id="timeTrigger">
        <div class="time" id="time">00:00:00</div>
        <div class="date" id="date">2026-04-12 星期日</div>
    </div>

    <div class="search-wrap">
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-input" placeholder="搜索一下~">
        </div>
        <div class="suggest" id="suggest"></div>
    </div>

    <div class="nav-box" id="navBox"></div>
</div>

<script>
// 版本号（用于云端同步更新）
const VERSION = '1.2.0';

const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

let fireworks = [];
let particles = [];

function random(min, max) {
    return Math.random() * (max - min) + min;
}

class Firework {
    constructor() {
        this.x = random(50, canvas.width - 50);
        this.y = canvas.height;
        this.targetY = random(50, canvas.height / 2);
        this.speed = random(6, 10);
        this.color = `hsl(${random(0, 360)}, 100%, 60%)`;
    }
    update() {
        this.y -= this.speed;
        if (this.y < this.targetY) {
            this.explode();
            return true;
        }
        return false;
    }
    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
    explode() {
        for (let i = 0; i < 80; i++) {
            particles.push(new Particle(this.x, this.y, this.color));
        }
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.vx = random(-6, 6);
        this.vy = random(-6, 6);
        this.alpha = 1;
        this.color = color;
    }
    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= 0.015;
    }
    draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, 2, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        ctx.restore();
    }
}

function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    fireworks = fireworks.filter(f => !f.update());
    particles = particles.filter(p => p.alpha > 0);
    fireworks.forEach(f => f.draw());
    particles.forEach(p => {
        p.update();
        p.draw();
    });
    requestAnimationFrame(loop);
}

setInterval(() => fireworks.push(new Firework()), 1000);
loop();

function updateDateTime(){
    const now=new Date();
    const w=['日','一','二','三','四','五','六'];
    document.getElementById('time').textContent=now.toTimeString().slice(0,8);
    document.getElementById('date').textContent=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,0)}-${String(now.getDate()).padStart(2,0)} 星期${w[now.getDay()]}`
}
setInterval(updateDateTime,1000);
updateDateTime();

const search=document.getElementById('searchInput');
const nav=document.getElementById('navBox');
const suggest=document.getElementById('suggest');
let timer;

let hasSearched = false;

// 关闭百度联想搜索，避免跨域报错
function getSuggest(word){}

function searchFn(q){
    if(!q)return;
    // 替换为你的网盘搜索
    window.open(q.startsWith('http')?q:`https://minmin2020-exh.github.io/pansou/?wd=${encodeURIComponent(q)}`);
    hasSearched = true;
    search.value = '';
    nav.classList.remove('hide');
    suggest.classList.remove('show');
}

window.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'visible' && hasSearched) {
        hasSearched = false;
        location.reload();
    }
});

search.addEventListener('input',()=>{
    clearTimeout(timer);
    const v=search.value.trim();
    v ? (nav.classList.add('hide'), timer=setTimeout(()=>getSuggest(v),100)) : (nav.classList.remove('hide'), suggest.classList.remove('show'))
});
search.addEventListener('blur',()=>setTimeout(()=>suggest.classList.remove('show'),200));
search.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
        searchFn(search.value.trim());
    }
});

function fixUrl(url){
    if(!url) return '';
    if(!/^https?:\/\//i.test(url)) return 'http://'+url;
    return url;
}

// ==============================================
// 系统固定书签
const SYS_BOOKMARKS = [
    {name:'后台', url:'http://38.246.248.159/agent.php/login/login.html', hide:true, isSys:true},
    {name:'查询', url:'http://38.246.248.159/#/pages/other/qorder', hide:true, isSys:true},
    {name:'谷歌', url:'https://2fa.run/', hide:true, isSys:true},
    {name:'豆包', url:'http://doubao.xyyh.xyz/', hide:false, isSys:true},
    {name:'美图', url:'https://mmrgb.com/', hide:false, isSys:true}
];

// 本地自定义书签
let userBookmarks = JSON.parse(localStorage.getItem('userBookmarks') || '[]');

// 最终列表
let list = [...SYS_BOOKMARKS, ...userBookmarks];
// ==============================================

// 点击时间三次显示/隐藏系统隐藏书签
let clickCount = 0;
let clickTimer;
document.getElementById('timeTrigger').onclick = () => {
    clickCount++;
    clearTimeout(clickTimer);
    clickTimer = setTimeout(() => clickCount = 0, 800);
    if (clickCount === 3) {
        clickCount = 0;
        document.querySelectorAll('.item.hidden').forEach(el => {
            el.style.display = el.style.display === 'none' ? 'flex' : 'none';
        });
    }
};

let currentIndex = null;

function render(){
    let html = '';
    list.forEach((it,i)=>{
        const t = it.name.charAt(0);
        const cls = it.hide ? 'item hidden' : 'item';
        html+=`
        <a class="${cls}" data-index="${i}" href="${it.url}" target="_blank">
            <div class="icon">${t}</div>
            <span>${it.name}</span>
        </a>`;
    });
    html+=`
    <div class="item add-btn" onclick="openAdd()">
        <div class="icon">+</div>
    </div>`;
    nav.innerHTML = html;
    bindLongPress();
}

function bindLongPress(){
    const items = document.querySelectorAll('.item:not(.add-btn)');
    let longTimer;
    items.forEach(el=>{
        el.ontouchstart = el.onmousedown = (e)=>{
            longTimer = setTimeout(()=>{
                if(e.type === 'mousedown') e.preventDefault();
                currentIndex = parseInt(el.dataset.index);
                showMenu(el);
            }, 500);
        };
        el.ontouchend = el.onmouseup = ()=>clearTimeout(longTimer);
        el.onmouseleave = ()=>clearTimeout(longTimer);
    });
}

const menu = document.getElementById('longMenu');
function showMenu(el){
    const rect = el.getBoundingClientRect();
    menu.style.left = rect.left + 'px';
    menu.style.top = rect.bottom + 8 + 'px';
    menu.classList.add('show');
}
document.addEventListener('click',()=>menu.classList.remove('show'));

const addMask = document.getElementById('addMask');
function openAdd(){
    document.getElementById('addName').value = '';
    document.getElementById('addUrl').value = '';
    addMask.classList.add('show');
}
function closeAdd(){ addMask.classList.remove('show') }
function saveAdd(){
    const name = document.getElementById('addName').value.trim();
    let url = document.getElementById('addUrl').value.trim();
    if(!name || !url) return alert('请填写完整');
    url = fixUrl(url);

    const newItem = {name, url, hide:false, isSys:false};
    userBookmarks.push(newItem);
    localStorage.setItem('userBookmarks', JSON.stringify(userBookmarks));
    list = [...SYS_BOOKMARKS, ...userBookmarks];
    render();
    closeAdd();
}

const editMask = document.getElementById('editMask');
function openEdit(){
    menu.classList.remove('show');
    const item = list[currentIndex];
    if(item.isSys){
        alert('系统默认书签不可编辑');
        return;
    }
    document.getElementById('editName').value = item.name;
    document.getElementById('editUrl').value = item.url;
    editMask.classList.add('show');
}
function closeEdit(){ editMask.classList.remove('show') }
function saveEdit(){
    const name = document.getElementById('editName').value.trim();
    let url = document.getElementById('editUrl').value.trim();
    if(!name || !url) return alert('请填写完整');
    url = fixUrl(url);

    const item = list[currentIndex];
    if(item.isSys) return;

    userBookmarks = userBookmarks.map(b => 
        b === item ? {name, url, hide:false, isSys:false} : b
    );
    localStorage.setItem('userBookmarks', JSON.stringify(userBookmarks));
    list = [...SYS_BOOKMARKS, ...userBookmarks];
    render();
    closeEdit();
}

function doDel(){
    menu.classList.remove('show');
    const item = list[currentIndex];
    if(item.isSys){
        alert('系统默认书签不可删除');
        return;
    }
    if(!confirm('确定删除？')) return;

    userBookmarks = userBookmarks.filter(b => b !== item);
    localStorage.setItem('userBookmarks', JSON.stringify(userBookmarks));
    list = [...SYS_BOOKMARKS, ...userBookmarks];
    render();
}

render();
</script>
</body>
</html>
