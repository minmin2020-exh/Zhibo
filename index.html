<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>直播平台导航 - 带房间列表</title>
    <link href="https://cdn.jsdelivr.net/npm/video.js@8/dist/video-js.min.css" rel="stylesheet">
    <style>
        body { font-family: "Microsoft YaHei", sans-serif; margin:0; background:#f4f4f9; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color:white; padding:15px; text-align:center; }
        .main { display:flex; flex-wrap:wrap; max-width:1400px; margin:20px auto; gap:20px; }
        
        /* 左侧平台列表 */
        .platforms { width:280px; background:white; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1); padding:15px; height:fit-content; }
        .search { width:100%; padding:12px; border:1px solid #ddd; border-radius:8px; margin-bottom:15px; }
        .platform-list { max-height:75vh; overflow-y:auto; }
        .platform-item {
            display:flex; align-items:center; padding:10px; margin-bottom:8px; border-radius:8px; cursor:pointer; transition:0.3s;
        }
        .platform-item:hover, .platform-item.active { background:#f0f0ff; }
        .platform-item img { width:50px; height:50px; object-fit:cover; border-radius:8px; margin-right:12px; }
        .platform-info { flex:1; }
        .platform-info h4 { margin:0; font-size:16px; }
        .platform-info span { font-size:13px; color:#e91e63; }

        /* 右侧房间区域 */
        .rooms { flex:1; min-width:300px; background:white; border-radius:12px; box-shadow:0 4px 20px rgba(0,0,0,0.1); padding:20px; }
        .room-grid {
            display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:15px;
        }
        .room-card {
            border:1px solid #eee; border-radius:10px; overflow:hidden; background:white;
        }
        .room-card img { width:100%; height:160px; object-fit:cover; }
        .room-info { padding:12px; }
        .room-info h4 { margin:0 0 8px; font-size:15px; }
        .play-btn {
            background:#ff4081; color:white; border:none; padding:10px 15px; width:100%; border-radius:6px; cursor:pointer; font-weight:bold;
        }
        .play-btn:hover { background:#f50057; }

        /* 播放器弹窗 */
        .modal {
            display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; align-items:center; justify-content:center;
        }
        .modal-content {
            width:90%; max-width:900px; background:#000; border-radius:10px; overflow:hidden;
        }
        .close { position:absolute; top:15px; right:20px; color:white; font-size:30px; cursor:pointer; }

        @media (max-width:900px) {
            .main { flex-direction:column; }
            .platforms { width:100%; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌸 直播平台导航（带房间列表）</h1>
    </div>

    <div class="main">
        <!-- 左侧平台列表 -->
        <div class="platforms">
            <input type="text" id="search" class="search" placeholder="搜索平台名称...">
            <div class="platform-list" id="platformList"></div>
        </div>

        <!-- 右侧房间区域 -->
        <div class="rooms">
            <h2 id="currentPlatform">请选择左侧平台</h2>
            <div id="roomList" class="room-grid"></div>
        </div>
    </div>

    <!-- 视频播放弹窗 -->
    <div class="modal" id="playerModal">
        <div class="modal-content">
            <span class="close" onclick="closePlayer()">×</span>
            <video id="videoPlayer" class="video-js vjs-default-skin" controls preload="auto" width="100%" height="500"></video>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/video.js@8/dist/video.min.js"></script>
    <script>
        const baseUrl = "http://api.hclyz.com:81/mf/";
        let currentPlayer = null;

        async function loadPlatforms() {
            try {
                const res = await fetch(baseUrl + "json.txt");
                const data = await res.json();
                renderPlatforms(data.pingtai);
            } catch (e) {
                alert("加载平台列表失败，请检查网络");
            }
        }

        function renderPlatforms(platforms) {
            const container = document.getElementById("platformList");
            container.innerHTML = "";

            platforms.forEach(p => {
                const div = document.createElement("div");
                div.className = "platform-item";
                div.innerHTML = `
                    <img src="${p.xinimg}" onerror="this.src='https://via.placeholder.com/50?text=直播'">
                    <div class="platform-info">
                        <h4>${p.title}</h4>
                        <span>房间数：${p.Number}</span>
                    </div>
                `;
                div.onclick = () => loadRooms(p);
                container.appendChild(div);
            });
