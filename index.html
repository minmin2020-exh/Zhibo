<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>万能去水印</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,"Microsoft YaHei"}
body{background:#1677ff;padding:20px}
.main{max-width:400px;margin:0 auto;background:#fff;border-radius:14px;padding:30px 25px}
.title{text-align:center;font-size:22px;margin-bottom:6px}
.desc{text-align:center;color:#666;margin-bottom:30px;font-size:14px}
input{width:100%;height:46px;border:1px solid #ddd;border-radius:8px;padding:0 14px;margin-bottom:16px;outline:none}
button{width:100%;height:46px;background:#1677ff;color:#fff;border:none;border-radius:8px;font-size:16px}
.tip{text-align:center;font-size:12px;color:#999;margin-top:12px}
#result{margin-top:24px;display:none}
#result img{width:100%;border-radius:8px;margin-bottom:14px}
.down{display:block;width:100%;height:44px;line-height:44px;text-align:center;background:#00b42a;color:#fff;text-decoration:none;border-radius:8px}
</style>
</head>
<body>

<div class="main">
  <div class="title">万能去水印</div>
  <div class="desc">免费 · 快速 · 无广告</div>

  <input type="text" id="url" placeholder="粘贴视频链接">
  <button onclick="go()">开始解析</button>
  <div class="tip">支持抖音/快手/小红书/视频号/微博</div>

  <div id="result">
    <img id="cover">
    <a id="download" class="down" target="_blank">下载无水印视频</a>
  </div>
</div>

<script>
async function go(){
  let u = document.getElementById('url').value.trim();
  if(!u) return alert('请输入链接');

  try {
    let api = 'https://api.123124.xyz/api/douyin?url=' + encodeURIComponent(u);
    let res = await fetch(api);
    let d = await res.json();

    if(d.code == 200){
      document.getElementById('result').style.display = 'block';
      document.getElementById('cover').src = d.cover;
      document.getElementById('download').href = d.play_url;
    } else {
      alert('解析失败：' + d.msg);
    }
  } catch(e){
    alert('解析异常，换个链接或稍后再试');
  }
}
</script>
</body>
</html>
