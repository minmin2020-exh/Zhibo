<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>全网影视搜索 - 强制更新版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#111;color:#f6f6f6;font-family:system-ui;
    min-height:100vh;padding:20px 15px 60px;
}
.container{max-width:700px;margin:0 auto}
.logo{
    text-align:center;font-size:32px;font-weight:700;
    margin:80px 0 12px;color:#fff;
}
.desc{
    text-align:center;color:#999;font-size:15px;margin-bottom:30px;
}
.search-row{
    display:flex;gap:10px;margin-bottom:26px;
}
.search-input{
    flex:1;height:54px;padding:0 20px;
    border:none;border-radius:14px;
    background:#1c1c1e;color:#fff;font-size:16px;
    outline:none;
}
.search-btn{
    padding:0 28px;background:#e63946;color:#fff;
    border:none;border-radius:14px;font-size:16px;font-weight:600;
    cursor:pointer;
}
.result{
    background:#1c1c1e;border-radius:12px;padding:16px;margin-bottom:10px;
}
.result a{
    color:#f2f2f2;text-decoration:none;font-size:16px;font-weight:500;
    display:block;margin-bottom:6px;
}
.result small{
    color:#888;font-size:13px;
}
.loading{
    text-align:center;color:#aaa;padding:40px 0;font-size:15px;
}
.foot{
    text-align:center;color:#666;font-size:13px;margin-top:60px;
}
</style>
</head>
<body>

<div class="container">
    <div class="logo">影视搜索</div>
    <div class="desc">电影狗 / 茶杯狐 聚合搜索</div>
    <div class="search-row">
        <input type="text" id="kw" class="search-input" placeholder="输入电影、剧集、动漫">
        <button class="search-btn" onclick="search()">搜索</button>
    </div>
    <div id="result-box"></div>
    <div class="foot">仅搜索跳转 | 无存储 | 支持强制云端更新</div>
</div>

<script>
// ==============================================
// 🔥 云端强制更新：改这里数字即可全网强制刷新
// ==============================================
const VERSION = "2026041301";  // 每次改版本号就强制更新
const STORAGE_KEY = "movie_search_sites";
const VERSION_KEY = "movie_search_version";

// 你的影视站列表（云端核心数据）
const CLOUD_SITES = [
  { name: "茶杯狐", url: "https://cupfox.app", path: "/search/" },
  { name: "厂长资源", url: "https://www.czzy.live", path: "/search.html?keyword=" },
  { name: "比特大雄", url: "https://www.btdx8.vip", path: "/search/" },
  { name: "高端影视", url: "https://www.gdyy.digital", path: "/index/search?wd=" },
  { name: "云盘资源", url: "https://www.aliyundrive.cc", path: "/search?keyword=" },
  { name: "555电影", url: "https://www.555film.cc", path: "/search.html?wd=" },
  { name: "Libvio", url: "https://www.libvio.vip", path: "/search/" },
  { name: "剧圈圈", url: "https://www.juquanquan.cc", path: "/search?key=" },
  { name: "可可影视", url: "https://www.kekeys.com", path: "/search/" },
  { name: "麦田影院", url: "https://www.mtyy.org", path: "/search/" },
  { name: "金牌影院", url: "https://www.jinpyy.com", path: "/search/" },
  { name: "影乐酷", url: "https://www.yleku.com", path: "/search/" },
  { name: "飞快TV", url: "https://www.fasttv.cc", path: "/search?wd=" },
  { name: "4K影视", url: "https://www.4kys.cc", path: "/search/" },
  { name: "橙子影视", url: "https://www.czyys.com", path: "/search/" }
];

// 强制更新逻辑
function loadSites() {
  const localVer = localStorage.getItem(VERSION_KEY);
  if (localVer !== VERSION) {
    // 版本不一致 → 强制覆盖云端数据
    localStorage.setItem(STORAGE_KEY, JSON.stringify(CLOUD_SITES));
    localStorage.setItem(VERSION_KEY, VERSION);
    console.log("✅ 云端强制更新成功");
  }
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || CLOUD_SITES;
}

// 搜索
const sites = loadSites();
function search() {
  const kw = document.getElementById('kw').value.trim();
  if (!kw) return alert('请输入影视名称');
  const box = document.getElementById('result-box');
  box.innerHTML = '<div class="loading">正在全网搜索资源...</div>';
  setTimeout(() => {
    let html = "";
    sites.forEach(s => {
      const u = s.url + s.path + encodeURIComponent(kw);
      html += `
      <div class="result">
        <a href="${u}" target="_blank">${kw} — ${s.name}</a>
        <small>${s.url}</small>
      </div>`;
    });
    box.innerHTML = html;
  }, 500);
}

document.getElementById('kw').addEventListener('keydown', e => {
  if (e.key === 'Enter') search();
});
</script>
</body>
</html>
