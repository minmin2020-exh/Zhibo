<!DOCTYPE html>
<meta charset="gbk">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>直播导航</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#fff;font-family:sans-serif}
.player{width:100%;height:250px;background:#000;margin:10px 0}
iframe{width:100%;height:100%;border:none}
.list{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:8px;padding:10px}
.item{background:#222;padding:12px;text-align:center;border-radius:10px;font-size:14px;cursor:pointer}
.item:hover{background:#007AFF}
</style>

<iframe class="player" id="player" allowfullscreen></iframe>
<div id="list" class="list">加载中...</div>

<script>
let allList = [];

fetch("http://api.hclyz.com:81/mf/yuncaidan.txt")
.then(res=>res.text())
.then(data=>{
  let lines = data.split(/\n/);
  allList = [];
  let html = "";

  lines.forEach(line=>{
    line = line.trim();
    if(!line) return;
    let [name,url] = line.split(",");
    if(name && url && url.startsWith("http")){
      allList.push({name,url});
      html+=`<div class="item" data-name="${name}">${name}</div>`;
    }
  });

  document.getElementById("list").innerHTML = html;

  document.querySelectorAll(".item").forEach(item=>{
    item.onclick = function(){
      let url = this.dataset.name;
      let find = allList.find(i=>i.name==url);
      if(find){
        document.getElementById("player").src = 
        "https://api.qqsuu.cn/player/?url=" + encodeURIComponent(find.url);
      }
    }
  })
})
</script>
