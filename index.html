<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>茶杯狐同款影视搜索</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
    background:#111;color:#fff;font-family:system-ui;
    padding:20px 15px 60px;
}
.container{max-width:700px;margin:0 auto}

.logo{
    text-align:center;font-size:26px;margin:50px 0 20px;
    font-weight:bold;
}
.search{
    display:flex;gap:10px;margin-bottom:26px;
}
.search input{
    flex:1;height:50px;padding:0 18px;border-radius:25px;
    background:#1c1c1e;color:#fff;border:none;outline:none;font-size:16px;
}
.search button{
    width:60px;height:50px;border-radius:25px;
    background:#e63946;color:#fff;border:none;font-size:18px;
}

.item{
    background:#1a1a1a;border-radius:16px;padding:14px;
    display:flex;gap:12px;margin-bottom:10px;
}
.cover{
    width:80px;height:120px;border-radius:10px;object-fit:cover;
}
.info{flex:1}
.title{font-size:16px;font-weight:bold;margin-bottom:6px}
.meta{color:#999;font-size:13px;margin-bottom:6px}
.play{
    padding:8px 14px;background:#e63946;color:#fff;
    border:none;border-radius:10px;margin-top:6px;font-size:14px;
}

.foot{
    text-align:center;color:#666;font-size:12px;margin-top:40px;
}
</style>
</head>

<body>
<div class="container">
    <div class="logo">茶杯狐同款影视搜索</div>
    <div class="search">
        <input id="kw" placeholder="输入电影/剧集名称">
        <button onclick="search()">→</button>
    </div>

    <div id="result"></div>

    <div class="foot">支持强制更新 · 多线路播放源</div>
</div>

<script>
// ==============================================
// 🔥 强制更新开关：改这个数字就全网强制刷新
// ==============================================
const VERSION = "2026041303";
const STORAGE_KEY = "movie_sites";
const VERSION_KEY = "movie_version";

// 云端播放源（你在这里更新）
const CLOUD_SITES = [
  { name:"茶杯狐",    url:"https://cupfox.app/search/" },
  { name:"厂长资源",  url:"https://www.czzy.live/search.html?keyword=" },
  { name:"LIBVIO",    url:"https://www.libvio.vip/search/" },
  { name:"555电影",   url:"https://www.555film.cc/search.html?wd=" },
  { name:"云盘影视",  url:"https://www.aliyundrive.cc/search?keyword=" },
];

// 强制更新逻辑
function getSites() {
  const localV = localStorage.getItem(VERSION_KEY);
  if (localV !== VERSION) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(CLOUD_SITES));
    localStorage.setItem(VERSION_KEY, VERSION);
    console.log("✅ 已强制更新至最新站点");
  }
  return JSON.parse(localStorage.getItem(STORAGE_KEY)) || CLOUD_SITES;
}

const sites = getSites();

// 搜索
function search() {
  const kw = document.getElementById("kw").value.trim();
  if (!kw) return alert("请输入影片名称");

  let html = "";
  sites.forEach(s => {
    const link = s.url + encodeURIComponent(kw);
    html += `
    <div class="item">
      <img class="cover" src="https://picsum.photos/seed/${kw}/300/450">
      <div class="info">
        <div class="title">${kw}</div>
        <div class="meta">${s.name} 高清在线</div>
        <button class="play" onclick="window.open('${link}')">立即播放</button>
      </div>
    </div>`;
  });

  document.getElementById("result").innerHTML = html;
}

document.getElementById("kw").addEventListener("keydown", e => {
  if (e.key === "Enter") search();
});
</script>
</body>
</html>
